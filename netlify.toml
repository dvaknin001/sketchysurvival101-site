# Netlify config for the Sketchy Survival 101 static site.
# For drag-and-drop deploys this file is optional; it's here so a
# Git-connected deploy "just works" with no build step.

[build]
  publish = "."
  command = ""

# Pretty 404
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# Basic security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
